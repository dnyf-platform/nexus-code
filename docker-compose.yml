version: '3.8'

services:
  nexuscode:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080      - ENABLE_AUTH=false
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/system/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
