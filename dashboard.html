<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e1e1e">
    <title>Dashboard - NexusCode</title>
    <link rel="stylesheet" href="css/themes/dark-theme.css">
    <link rel="stylesheet" href="css/themes/light-theme.css">
    <link rel="stylesheet" href="css/themes/high-contrast.css">
    <link rel="stylesheet" href="css/layout-engine.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: var(--bg-primary, #1e1e1e); color: var(--text-primary, #ccc); font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .page { max-width: 1000px; margin: 0 auto; padding: 20px; padding-top: calc(20px + var(--safe-top)); padding-bottom: calc(80px + var(--safe-bottom)); min-height: 100vh; }
        .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; }
        .back-btn { font-size: 20px; text-decoration: none; color: var(--text-secondary, #969696); padding: 8px 12px; border-radius: 8px; background: var(--bg-secondary, #252526); border: 1px solid var(--border-color, #3e3e42); }
        .back-btn:hover { color: var(--text-primary); background: var(--bg-hover, #2a2d2e); }
        .page-title { font-size: 24px; font-weight: 700; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-secondary, #252526); border: 1px solid var(--border-color, #3e3e42); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-value { font-size: 36px; font-weight: 700; color: var(--accent-primary, #007acc); }
        .stat-label { font-size: 12px; color: var(--text-secondary, #969696); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .section { background: var(--bg-secondary, #252526); border: 1px solid var(--border-color, #3e3e42); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section h3 { font-size: 16px; margin-bottom: 12px; }
        .activity-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-color, #3e3e42); font-size: 13px; }
        .activity-time { color: var(--text-muted, #6a6a6a); font-size: 11px; }
        .action-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .action-btn { padding: 12px; background: var(--bg-tertiary, #2d2d30); border: 1px solid var(--border-color, #3e3e42); border-radius: 8px; color: var(--text-primary); cursor: pointer; font-size: 13px; text-align: center; transition: all 0.15s; }
        .action-btn:hover { background: var(--accent-primary, #007acc); color: white; border-color: var(--accent-primary); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 8px; padding-bottom: calc(8px + var(--safe-bottom)); background: var(--bg-secondary, #252526); border-top: 1px solid var(--border-color, #3e3e42); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 10px; background: none; border: none; color: var(--text-secondary, #969696); cursor: pointer; font-size: 10px; text-decoration: none; border-radius: 6px; min-width: 48px; }
        .nav-item.active { color: var(--accent-primary, #007acc); }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <a href="home.html" class="back-btn">← Back</a>
            <h1 class="page-title">📊 Dashboard</h1>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value" id="stat-files">3</div><div class="stat-label">Files</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-lines">45</div><div class="stat-label">Lines of Code</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-size">2.4K</div><div class="stat-label">Total Size</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-errors">0</div><div class="stat-label">Errors</div></div>
        </div>

        <div class="section">
            <h3>🕒 Recent Activity</h3>
            <div id="activity-list">
                <div class="activity-item"><span>📄 Edited index.html</span><span class="activity-time">2 min ago</span></div>
                <div class="activity-item"><span>💾 Saved styles.css</span><span class="activity-time">15 min ago</span></div>
                <div class="activity-item"><span>🚀 Project opened</span><span class="activity-time">1 hour ago</span></div>
                <div class="activity-item"><span>📋 Template applied</span><span class="activity-time">3 hours ago</span></div>
            </div>
        </div>

        <div class="section">
            <h3>⚡ Quick Actions</h3>
            <div class="action-grid">
                <button class="action-btn" onclick="location.href='index.html'">✏️ Open Editor</button>
                <button class="action-btn" onclick="location.href='terminal/terminal.html'">⬛ Terminal</button>
                <button class="action-btn" onclick="location.href='templates.html'">📋 Templates</button>
                <button class="action-btn" onclick="location.href='settings.html'">⚙ Settings</button>
                <button class="action-btn" onclick="location.href='plugins.html'">🧩 Plugins</button>
                <button class="action-btn" onclick="location.href='search.html'">🔍 Search</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
        <a href="dashboard.html" class="nav-item active"><span class="nav-icon">📊</span>Dashboard</a>
        <a href="index.html" class="nav-item"><span class="nav-icon">✏️</span>Editor</a>
        <a href="terminal/terminal.html" class="nav-item"><span class="nav-icon">⬛</span>Terminal</a>
        <a href="settings.html" class="nav-item"><span class="nav-icon">⚙</span>Settings</a>
    </nav>

    <script>
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.style.transform = 'scale(0.95)';
                setTimeout(() => this.style.transform = '', 150);
            });
        });
    </script>
</body>
</html>
