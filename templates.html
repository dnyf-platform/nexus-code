<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e1e1e">
    <title>Templates - NexusCode</title>
    <link rel="stylesheet" href="css/themes/dark-theme.css">
    <link rel="stylesheet" href="css/templates.css">
    <style>
        :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: var(--bg-primary, #1e1e1e); color: var(--text-primary, #ccc); font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .page { max-width: 1000px; margin: 0 auto; padding: 20px; padding-top: calc(20px + var(--safe-top)); padding-bottom: calc(80px + var(--safe-bottom)); min-height: 100vh; }
        .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .back-btn { font-size: 20px; text-decoration: none; color: var(--text-secondary); padding: 8px 12px; border-radius: 8px; background: var(--bg-secondary, #252526); border: 1px solid var(--border-color, #3e3e42); }
        .back-btn:hover { color: var(--text-primary); }
        .page-title { font-size: 24px; font-weight: 700; }
        .search-box { width: 100%; padding: 12px 16px; background: var(--bg-secondary, #252526); border: 1px solid var(--border-color, #3e3e42); border-radius: 10px; color: var(--text-primary); font-size: 14px; outline: none; margin-bottom: 20px; }
        .search-box:focus { border-color: var(--accent-primary, #007acc); }
        .templates-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
        .template-card { background: var(--bg-secondary, #252526); border: 1px solid var(--border-color, #3e3e42); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.2s; }
        .template-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-color: var(--accent-primary); }
        .template-preview { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .template-info { padding: 14px; }
        .template-info h4 { font-size: 15px; margin-bottom: 4px; }
        .template-info p { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
        .template-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        .tag { padding: 3px 8px; background: var(--bg-tertiary, #2d2d30); border: 1px solid var(--border-color); border-radius: 10px; font-size: 10px; color: var(--text-secondary); }
        .template-actions { padding: 10px 14px; border-top: 1px solid var(--border-color); display: flex; gap: 8px; }
        .btn-use { flex: 1; padding: 8px; background: var(--accent-primary, #007acc); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-preview { flex: 1; padding: 8px; background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; font-size: 12px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 8px; padding-bottom: calc(8px + var(--safe-bottom)); background: var(--bg-secondary); border-top: 1px solid var(--border-color); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 10px; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 10px; text-decoration: none; border-radius: 6px; min-width: 48px; }
        .nav-item.active { color: var(--accent-primary); }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <a href="home.html" class="back-btn">← Back</a>
            <h1 class="page-title">📋 Templates</h1>
        </div>

        <input type="text" class="search-box" id="search-templates" placeholder="🔍 Search templates...">

        <div class="templates-grid" id="templates-grid">
            <!-- Generated by JS -->
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
        <a href="index.html" class="nav-item"><span class="nav-icon">✏️</span>Editor</a>
        <a href="terminal/terminal.html" class="nav-item"><span class="nav-icon">⬛</span>Terminal</a>
        <a href="settings.html" class="nav-item"><span class="nav-icon">⚙</span>Settings</a>
    </nav>

    <script>
        const templates = [
            { id: 'html5', name: 'HTML5 Starter', icon: '🌐', desc: 'Clean HTML5 boilerplate with responsive meta tags', tags: ['html', 'starter'], color: '#ff6b35' },
            { id: 'react', name: 'React App', icon: '⚛️', desc: 'Simple React application setup with components', tags: ['react', 'spa', 'javascript'], color: '#61dafb' },
            { id: 'vue', name: 'Vue SPA', icon: '💚', desc: 'Vue.js single page application template', tags: ['vue', 'spa'], color: '#42b883' },
            { id: 'dashboard', name: 'Admin Dashboard', icon: '📊', desc: 'Responsive admin panel with sidebar and cards', tags: ['dashboard', 'admin'], color: '#764ba2' },
            { id: 'portfolio', name: 'Portfolio', icon: '🎨', desc: 'Personal portfolio with project showcase', tags: ['portfolio', 'personal'], color: '#667eea' },
            { id: 'landing', name: 'Landing Page', icon: '🚀', desc: 'Product landing page with CTA sections', tags: ['landing', 'marketing'], color: '#e94560' },
            { id: 'blog', name: 'Blog Template', icon: '📝', desc: 'Clean blog layout with article cards', tags: ['blog', 'content'], color: '#f093fb' },
            { id: 'api-docs', name: 'API Documentation', icon: '📚', desc: 'Beautiful API documentation page', tags: ['docs', 'api'], color: '#4facfe' },
            { id: 'pwa', name: 'PWA Starter', icon: '📱', desc: 'Progressive Web App with service worker', tags: ['pwa', 'mobile'], color: '#43e97b' },
        ];

        function renderTemplates(filter = '') {
            const grid = document.getElementById('templates-grid');
            const filtered = filter ? templates.filter(t => 
                t.name.toLowerCase().includes(filter) || t.tags.some(tag => tag.includes(filter))
            ) : templates;

            grid.innerHTML = filtered.map(t => `
                <div class="template-card">
                    <div class="template-preview" style="background:${t.color}22;">${t.icon}</div>
                    <div class="template-info">
                        <h4>${t.name}</h4>
                        <p>${t.desc}</p>
                        <div class="template-tags">${t.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
                    </div>
                    <div class="template-actions">
                        <button class="btn-preview" onclick="previewTemplate('${t.id}')">👁 Preview</button>
                        <button class="btn-use" onclick="useTemplate('${t.id}')">✓ Use</button>
                    </div>
                </div>
            `).join('');
        }

        function useTemplate(id) {
            const template = templates.find(t => t.id === id);
            if (confirm(`Apply "${template.name}" template? This will open the editor.`)) {
                localStorage.setItem('nexuscode_active_template', id);
                window.location.href = 'index.html';
            }
        }

        function previewTemplate(id) {
            alert('Preview feature: Opens template preview\n\nTemplate ID: ' + id);
        }

        document.getElementById('search-templates').addEventListener('input', function() {
            renderTemplates(this.value.toLowerCase());
        });

        renderTemplates();
    </script>
</body>
</html>
