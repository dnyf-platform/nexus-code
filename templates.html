<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Templates - NexusCode</title>
    <link rel="stylesheet" href="css/unified.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <a href="home.html" class="back-btn">🏠 Home</a>
            <h1 class="page-title">📋 Templates</h1>
            <span class="badge badge-primary" style="margin-left:auto;" id="template-count">9 templates</span>
        </header>

        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="search-templates" placeholder="Search templates by name or tag...">
        </div>

        <div class="grid grid-3" id="templates-grid"></div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
        <a href="index.html" class="nav-item"><span class="nav-icon">✏️</span>Editor</a>
        <a href="terminal/terminal.html" class="nav-item"><span class="nav-icon">⬛</span>Terminal</a>
        <a href="settings.html" class="nav-item"><span class="nav-icon">⚙</span>Settings</a>
    </nav>

    <div class="toast" id="toast"></div>

    <script>
        const templates = [
            { id:'html5', name:'HTML5 Starter', icon:'🌐', desc:'Clean HTML5 boilerplate with responsive meta tags', tags:['html','starter','responsive'], color:'#ff6b35', files:{'index.html':'<!DOCTYPE html>\n<html>\n<head><title>New Site</title></head>\n<body><h1>Hello World</h1></body>\n</html>'}},
            { id:'react', name:'React App', icon:'⚛️', desc:'React SPA with components and hooks', tags:['react','spa','javascript'], color:'#61dafb' },
            { id:'vue', name:'Vue SPA', icon:'💚', desc:'Vue.js single page application', tags:['vue','spa'], color:'#42b883' },
            { id:'dashboard', name:'Admin Dashboard', icon:'📊', desc:'Responsive admin panel with sidebar', tags:['dashboard','admin','layout'], color:'#764ba2' },
            { id:'portfolio', name:'Portfolio Site', icon:'🎨', desc:'Personal portfolio with project showcase', tags:['portfolio','personal','showcase'], color:'#667eea' },
            { id:'landing', name:'Landing Page', icon:'🚀', desc:'Product landing page with CTA sections', tags:['landing','marketing','product'], color:'#e94560' },
            { id:'blog', name:'Blog Template', icon:'📝', desc:'Clean blog layout with article cards', tags:['blog','content','writing'], color:'#f093fb' },
            { id:'pwa', name:'PWA Starter', icon:'📱', desc:'Progressive Web App with service worker', tags:['pwa','mobile','offline'], color:'#43e97b' },
            { id:'api-docs', name:'API Documentation', icon:'📚', desc:'Beautiful API documentation page', tags:['docs','api','reference'], color:'#4facfe' },
        ];

        function render(filter = '') {
            const f = filter ? templates.filter(t => t.name.toLowerCase().includes(filter) || t.tags.some(tg => tg.includes(filter))) : templates;
            document.getElementById('template-count').textContent = f.length + ' template' + (f.length !== 1 ? 's' : '');
            document.getElementById('templates-grid').innerHTML = f.map((t, i) => `
                <div class="card fade-in" style="animation-delay:${i * 0.05}s;padding:0;overflow:hidden;">
                    <div style="height:100px;display:flex;align-items:center;justify-content:center;font-size:44px;background:${t.color}15;">${t.icon}</div>
                    <div style="padding:var(--space-md);">
                        <h4 style="font-size:var(--font-size);margin-bottom:2px;">${t.name}</h4>
                        <p style="font-size:var(--font-size-sm);color:var(--text-dim);margin-bottom:8px;">${t.desc}</p>
                        <div style="display:flex;flex-wrap:wrap;gap:4px;">${t.tags.map(tg => `<span class="tag">${tg}</span>`).join('')}</div>
                    </div>
                    <div style="padding:var(--space-sm) var(--space-md);border-top:1px solid var(--border);display:flex;gap:8px;">
                        <button class="btn btn-sm" onclick="previewTemplate('${t.id}')">👁 Preview</button>
                        <button class="btn btn-primary btn-sm" onclick="useTemplate('${t.id}')">✓ Use Template</button>
                    </div>
                </div>
            `).join('');
        }

        function useTemplate(id) {
            const t = templates.find(tp => tp.id === id);
            if (t && t.files) {
                localStorage.setItem('nexuscode_files', JSON.stringify(
                    Object.entries(t.files).map(([name, content]) => ({ name, content, type: 'file' }))
                ));
            }
            showToast('✅ Template "' + t.name + '" applied! Opening editor...');
            setTimeout(() => location.href = 'index.html', 600);
        }

        function previewTemplate(id) {
            const t = templates.find(tp => tp.id === id);
            showToast('👁 Previewing: ' + t.name);
        }

        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg; el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2000);
        }

        document.getElementById('search-templates').addEventListener('input', function() {
            render(this.value.toLowerCase());
        });

        render();
    </script>
</body>
</html>
