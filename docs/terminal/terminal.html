<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NexusCode Terminal</title>
    <link rel="stylesheet" href="terminal.css">
</head>
<body>
    <div class="terminal-app" id="terminal-app">
        <!-- Header -->
        <div class="terminal-header">
            <div class="terminal-title">
                <span class="dot"></span>
                <span>⬛ NexusCode Terminal</span>
                <span class="version">v3.0</span>
            </div>
            <div class="terminal-actions">
                <button id="btn-clear" title="Clear">🗑</button>
                <button id="btn-copy" title="Copy All">📋</button>
                <button id="btn-paste" title="Paste">📄</button>
                <button id="btn-keyboard" title="Keyboard">⌨</button>
                <button id="btn-settings" title="Settings">⚙</button>
                <button id="btn-fullscreen" title="Fullscreen">⛶</button>
            </div>
        </div>

        <!-- Screen -->
        <div class="terminal-screen" id="terminal-screen">
            <div class="terminal-output" id="terminal-output"></div>
        </div>

        <!-- Suggestions -->
        <div class="suggestions-bar" id="suggestions-bar"></div>

        <!-- Keyboard Toolbar -->
        <div class="keyboard-toolbar" id="keyboard-toolbar"></div>

        <!-- Input Line -->
        <div class="terminal-input-line">
            <span class="terminal-prompt" id="terminal-prompt">$</span>
            <input type="text" 
                   class="terminal-input" 
                   id="terminal-input" 
                   placeholder="Type command..."
                   autocomplete="off"
                   autocorrect="off"
                   autocapitalize="none"
                   spellcheck="false"
                   enterkeyhint="send">
        </div>

        <!-- Status Bar -->
        <div class="terminal-status">
            <span id="status-time">00:00</span>
            <span id="status-dir">~/</span>
            <span id="status-conn">● Online</span>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚙ Terminal Settings</h3>
                <button class="modal-close" id="btn-close-settings">×</button>
            </div>
            <div class="modal-body" id="settings-body"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Scripts in dependency order -->
    <script src="js/terminalFilesystem.js"></script>
    <script src="js/terminalHistory.js"></script>
    <script src="js/terminalAutocomplete.js"></script>
    <script src="js/terminalClipboard.js"></script>
    <script src="js/terminalKeyboard.js"></script>
    <script src="js/terminalCommands.js"></script>
    <script src="js/terminalUI.js"></script>
    <script src="js/terminalSettings.js"></script>
    <script src="js/terminalEngine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
