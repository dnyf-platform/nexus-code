<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e1e1e">
    <title>Plugins - NexusCode</title>
    <link rel="stylesheet" href="css/themes/dark-theme.css">
    <style>
        :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: var(--bg-primary, #1e1e1e); color: var(--text-primary, #ccc); font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .page { max-width: 800px; margin: 0 auto; padding: 20px; padding-top: calc(20px + var(--safe-top)); padding-bottom: calc(80px + var(--safe-bottom)); min-height: 100vh; }
        .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .back-btn { font-size: 20px; text-decoration: none; color: var(--text-secondary); padding: 8px 12px; border-radius: 8px; background: var(--bg-secondary, #252526); border: 1px solid var(--border-color, #3e3e42); }
        .back-btn:hover { color: var(--text-primary); }
        .page-title { font-size: 24px; font-weight: 700; }
        .plugin-card { background: var(--bg-secondary, #252526); border: 1px solid var(--border-color, #3e3e42); border-radius: 12px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; gap: 14px; }
        .plugin-icon { font-size: 32px; min-width: 48px; text-align: center; }
        .plugin-info { flex: 1; }
        .plugin-info h4 { font-size: 15px; margin-bottom: 2px; }
        .plugin-info p { font-size: 12px; color: var(--text-secondary); }
        .plugin-status { font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: 500; }
        .plugin-status.active { background: #3fb95022; color: #3fb950; }
        .plugin-status.inactive { background: #6a6a6a22; color: #6a6a6a; }
        .toggle-btn { padding: 8px 16px; border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; font-size: 12px; background: var(--bg-tertiary); color: var(--text-primary); }
        .toggle-btn.enable { background: var(--accent-primary, #007acc); color: white; border-color: var(--accent-primary); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 8px; padding-bottom: calc(8px + var(--safe-bottom)); background: var(--bg-secondary); border-top: 1px solid var(--border-color); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 10px; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 10px; text-decoration: none; border-radius: 6px; min-width: 48px; }
        .nav-item.active { color: var(--accent-primary); }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <a href="home.html" class="back-btn">← Back</a>
            <h1 class="page-title">🧩 Plugins</h1>
        </div>

        <div id="plugins-list">
            <!-- Generated by JS -->
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
        <a href="index.html" class="nav-item"><span class="nav-icon">✏️</span>Editor</a>
        <a href="terminal/terminal.html" class="nav-item"><span class="nav-icon">⬛</span>Terminal</a>
        <a href="settings.html" class="nav-item"><span class="nav-icon">⚙</span>Settings</a>
    </nav>

    <script>
        const plugins = [
            { id: 'prettier', name: 'Prettier', icon: '✨', desc: 'Code formatter for consistent style', active: true },
            { id: 'emmet', name: 'Emmet', icon: '⚡', desc: 'HTML/CSS expansion shortcuts', active: true },
            { id: 'theme-manager', name: 'Theme Manager', icon: '🎨', desc: 'Switch between color themes', active: true },
            { id: 'live-server', name: 'Live Server', icon: '🔄', desc: 'Auto-reload on file changes', active: false },
            { id: 'git-lens', name: 'Git Lens', icon: '🔍', desc: 'Git blame and code annotations', active: false },
            { id: 'autocomplete', name: 'AI Autocomplete', icon: '🤖', desc: 'Smart code suggestions', active: true },
            { id: 'minimap', name: 'Minimap', icon: '🗺️', desc: 'Code overview minimap', active: true },
            { id: 'snippets', name: 'Snippets', icon: '📋', desc: 'Code snippet library', active: false },
        ];

        function renderPlugins() {
            const container = document.getElementById('plugins-list');
            container.innerHTML = plugins.map(p => `
                <div class="plugin-card">
                    <div class="plugin-icon">${p.icon}</div>
                    <div class="plugin-info">
                        <h4>${p.name}</h4>
                        <p>${p.desc}</p>
                    </div>
                    <span class="plugin-status ${p.active ? 'active' : 'inactive'}">${p.active ? 'Active' : 'Inactive'}</span>
                    <button class="toggle-btn ${p.active ? '' : 'enable'}" data-id="${p.id}">
                        ${p.active ? 'Disable' : 'Enable'}
                    </button>
                </div>
            `).join('');

            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = this.dataset.id;
                    const plugin = plugins.find(p => p.id === id);
                    plugin.active = !plugin.active;
                    renderPlugins();
                });
            });
        }

        renderPlugins();
    </script>
</body>
</html>
