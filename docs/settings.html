<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Settings - NexusCode</title>
    <link rel="stylesheet" href="css/unified.css">
    <style>
        .settings-layout { display: grid; grid-template-columns: 200px 1fr; gap: var(--space-lg); }
        .settings-nav-btn {
            display: block; width: 100%; padding: 10px 14px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-dim);
            cursor: pointer; font-size: var(--font-size-sm); font-family: var(--font-sans);
            text-align: left; margin-bottom: 4px; transition: all 0.15s;
        }
        .settings-nav-btn:hover { background: var(--bg-hover); color: var(--text); }
        .settings-nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .settings-panel { display: none; }
        .settings-panel.active { display: block; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 12px; }
        .setting-row label { font-size: var(--font-size-sm); flex-shrink: 0; }
        .toggle { width: 44px; height: 24px; background: var(--border); border-radius: 12px; cursor: pointer; position: relative; transition: 0.2s; flex-shrink: 0; }
        .toggle.on { background: var(--accent); }
        .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: 0.2s; }
        .toggle.on::after { left: 22px; }
        @media (max-width:600px) {
            .settings-layout { grid-template-columns: 1fr; }
            .settings-nav { display: flex; overflow-x: auto; gap: 4px; padding-bottom: 4px; }
            .settings-nav-btn { white-space: nowrap; flex-shrink: 0; margin-bottom: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="page-header">
            <a href="home.html" class="back-btn">🏠 Home</a>
            <h1 class="page-title">⚙ Settings</h1>
            <button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="resetSettings()">🔄 Reset</button>
        </header>

        <div class="settings-layout">
            <div class="settings-nav">
                <button class="settings-nav-btn active" data-panel="general">🎛 General</button>
                <button class="settings-nav-btn" data-panel="editor">✏️ Editor</button>
                <button class="settings-nav-btn" data-panel="appearance">🎨 Appearance</button>
                <button class="settings-nav-btn" data-panel="terminal">⬛ Terminal</button>
                <button class="settings-nav-btn" data-panel="git">⎇ Git</button>
                <button class="settings-nav-btn" data-panel="about">ℹ About</button>
            </div>
            <div>
                <div class="settings-panel active card" id="panel-general">
                    <div class="card-header">General Settings</div>
                    <div class="setting-row"><label>Auto Save</label><select class="input" style="width:auto;"><option>After Delay</option><option>On Focus Change</option><option>Off</option></select></div>
                    <div class="setting-row"><label>Auto Save Delay (ms)</label><input type="number" class="input" style="width:100px;" value="1000"></div>
                    <div class="setting-row"><label>Confirm Before Close</label><span class="toggle on" onclick="this.classList.toggle('on')"></span></div>
                    <div class="setting-row"><label>Restore Last Session</label><span class="toggle on" onclick="this.classList.toggle('on')"></span></div>
                    <div class="setting-row"><label>Telemetry</label><select class="input" style="width:auto;"><option>Off</option><option>Errors Only</option></select></div>
                </div>
                <div class="settings-panel card" id="panel-editor">
                    <div class="card-header">Editor Settings</div>
                    <div class="setting-row"><label>Font Size</label><input type="number" class="input" style="width:80px;" value="14" min="8" max="32"></div>
                    <div class="setting-row"><label>Font Family</label><select class="input" style="width:auto;"><option>Monospace</option><option>Fira Code</option><option>JetBrains Mono</option></select></div>
                    <div class="setting-row"><label>Tab Size</label><input type="number" class="input" style="width:80px;" value="4" min="1" max="8"></div>
                    <div class="setting-row"><label>Insert Spaces</label><span class="toggle on" onclick="this.classList.toggle('on')"></span></div>
                    <div class="setting-row"><label>Word Wrap</label><select class="input" style="width:auto;"><option>Off</option><option>On</option></select></div>
                    <div class="setting-row"><label>Line Numbers</label><span class="toggle on" onclick="this.classList.toggle('on')"></span></div>
                    <div class="setting-row"><label>Minimap</label><span class="toggle on" onclick="this.classList.toggle('on')"></span></div>
                </div>
                <div class="settings-panel card" id="panel-appearance">
                    <div class="card-header">Appearance</div>
                    <div class="setting-row"><label>Color Theme</label><select class="input" style="width:auto;" id="theme-select"><option value="dark">Dark</option><option value="light">Light</option></select></div>
                    <div class="setting-row"><label>Icon Theme</label><select class="input" style="width:auto;"><option>Seti</option><option>Material</option></select></div>
                    <div class="setting-row"><label>Compact Mode</label><span class="toggle" onclick="this.classList.toggle('on')"></span></div>
                </div>
                <div class="settings-panel card" id="panel-terminal">
                    <div class="card-header">Terminal Settings</div>
                    <div class="setting-row"><label>Font Size</label><input type="number" class="input" style="width:80px;" value="13" min="8" max="24"></div>
                    <div class="setting-row"><label>Cursor Style</label><select class="input" style="width:auto;"><option>Block</option><option>Underline</option><option>Bar</option></select></div>
                    <div class="setting-row"><label>Scrollback Lines</label><input type="number" class="input" style="width:80px;" value="1000"></div>
                </div>
                <div class="settings-panel card" id="panel-git">
                    <div class="card-header">Git Settings</div>
                    <div class="setting-row"><label>Enable Git</label><span class="toggle on" onclick="this.classList.toggle('on')"></span></div>
                    <div class="setting-row"><label>Auto Fetch</label><span class="toggle on" onclick="this.classList.toggle('on')"></span></div>
                    <div class="setting-row"><label>Default Branch</label><input type="text" class="input" style="width:120px;" value="main"></div>
                </div>
                <div class="settings-panel card" id="panel-about">
                    <div class="card-header">About NexusCode Studio</div>
                    <p style="color:var(--text-dim);line-height:1.8;">
                        <strong>Version:</strong> 2.0.0<br>
                        <strong>Build:</strong> Production<br>
                        <strong>Platform:</strong> Web + Android<br>
                        <strong>License:</strong> MIT<br>
                        <strong>Repository:</strong> <a href="https://github.com/dnyf-platform/nexus-code" style="color:var(--accent);">github.com/dnyf-platform/nexus-code</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
        <a href="index.html" class="nav-item"><span class="nav-icon">✏️</span>Editor</a>
        <a href="terminal/terminal.html" class="nav-item"><span class="nav-icon">⬛</span>Terminal</a>
        <a href="settings.html" class="nav-item active"><span class="nav-icon">⚙</span>Settings</a>
    </nav>

    <script>
        document.querySelectorAll('.settings-nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.settings-nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.settings-panel').forEach(p => p.classList.remove('active'));
                document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
            });
        });
        document.getElementById('theme-select').addEventListener('change', function() {
            document.documentElement.setAttribute('data-theme', this.value);
            localStorage.setItem('nexuscode_theme', this.value);
        });
        (function() {
            const t = localStorage.getItem('nexuscode_theme');
            if (t) { document.getElementById('theme-select').value = t; document.documentElement.setAttribute('data-theme', t); }
        })();
        function resetSettings() {
            if (confirm('Reset all settings to defaults?')) {
                localStorage.removeItem('nexuscode_theme');
                location.reload();
            }
        }
    </script>
</body>
</html>
