<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Plugins - NexusCode</title>
    <link rel="stylesheet" href="css/unified.css">
</head>
<body>
    <div class="container">
        <header class="page-header">
            <a href="home.html" class="back-btn">🏠 Home</a>
            <h1 class="page-title">🧩 Plugins</h1>
            <span class="badge badge-primary" style="margin-left:auto;" id="active-count">5 active</span>
        </header>

        <div class="section-title">Installed Plugins</div>
        <div id="plugins-list"></div>
        
        <div class="section-title" style="margin-top:var(--space-lg);">Available Plugins</div>
        <div class="card">
            <div style="display:flex;align-items:center;gap:12px;">
                <span style="font-size:28px;">🛒</span>
                <div style="flex:1;">
                    <strong>Plugin Marketplace</strong>
                    <p style="color:var(--text-dim);font-size:12px;">Browse and install more plugins</p>
                </div>
                <span class="badge badge-warning">Coming Soon</span>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
        <a href="index.html" class="nav-item"><span class="nav-icon">✏️</span>Editor</a>
        <a href="terminal/terminal.html" class="nav-item"><span class="nav-icon">⬛</span>Terminal</a>
        <a href="settings.html" class="nav-item"><span class="nav-icon">⚙</span>Settings</a>
    </nav>

    <script>
        const plugins = [
            { id:'prettier', name:'Prettier', icon:'✨', desc:'Code formatter for consistent style across all languages', active:true, version:'1.2.0' },
            { id:'emmet', name:'Emmet', icon:'⚡', desc:'HTML/CSS expansion shortcuts for faster coding', active:true, version:'2.0.1' },
            { id:'theme-manager', name:'Theme Manager', icon:'🎨', desc:'Switch between dark, light, and custom color themes', active:true, version:'1.0.0' },
            { id:'liveserver', name:'Live Server', icon:'🔄', desc:'Auto-reload preview on file save with hot reload', active:false, version:'0.9.0' },
            { id:'gitlens', name:'Git Lens', icon:'🔍', desc:'Git blame annotations and code history inline', active:false, version:'1.5.0' },
            { id:'ai-autocomplete', name:'AI Autocomplete', icon:'🤖', desc:'Smart code suggestions powered by AI', active:true, version:'0.5.0' },
            { id:'minimap', name:'Minimap', icon:'🗺️', desc:'Code overview minimap for quick navigation', active:true, version:'1.1.0' },
            { id:'snippets', name:'Snippets Library', icon:'📋', desc:'Collection of useful code snippets and templates', active:false, version:'0.8.0' },
        ];

        function render() {
            const activeCount = plugins.filter(p => p.active).length;
            document.getElementById('active-count').textContent = activeCount + ' active';
            
            document.getElementById('plugins-list').innerHTML = plugins.map((p, i) => `
                <div class="card fade-in" style="animation-delay:${i * 0.05}s;">
                    <div style="display:flex;align-items:center;gap:14px;">
                        <span style="font-size:32px;width:48px;text-align:center;">${p.icon}</span>
                        <div style="flex:1;">
                            <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;">
                                <strong>${p.name}</strong>
                                <span style="font-size:10px;color:var(--text-dim);">v${p.version}</span>
                            </div>
                            <p style="color:var(--text-dim);font-size:12px;">${p.desc}</p>
                        </div>
                        <span class="badge ${p.active ? 'badge-success' : 'badge-warning'}">${p.active ? 'Active' : 'Inactive'}</span>
                        <button class="btn btn-sm ${p.active ? 'btn-danger' : 'btn-primary'}" onclick="togglePlugin('${p.id}')">
                            ${p.active ? 'Disable' : 'Enable'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function togglePlugin(id) {
            const p = plugins.find(pl => pl.id === id);
            if (p) { p.active = !p.active; render(); }
        }

        render();
    </script>
</body>
</html>
