<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e1e1e">
    <title>Settings - NexusCode</title>
    <link rel="stylesheet" href="css/themes/dark-theme.css">
    <link rel="stylesheet" href="css/themes/light-theme.css">
    <link rel="stylesheet" href="css/themes/high-contrast.css">
    <link rel="stylesheet" href="css/settings.css">
    <style>
        :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: var(--bg-primary, #1e1e1e); color: var(--text-primary, #ccc); font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .page { max-width: 800px; margin: 0 auto; padding: 20px; padding-top: calc(20px + var(--safe-top)); padding-bottom: calc(80px + var(--safe-bottom)); min-height: 100vh; }
        .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .back-btn { font-size: 20px; text-decoration: none; color: var(--text-secondary); padding: 8px 12px; border-radius: 8px; background: var(--bg-secondary, #252526); border: 1px solid var(--border-color, #3e3e42); }
        .back-btn:hover { color: var(--text-primary); }
        .page-title { font-size: 24px; font-weight: 700; }
        .settings-nav { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
        .settings-nav button { padding: 8px 16px; background: var(--bg-secondary, #252526); border: 1px solid var(--border-color, #3e3e42); border-radius: 20px; color: var(--text-secondary); cursor: pointer; font-size: 13px; white-space: nowrap; }
        .settings-nav button.active { background: var(--accent-primary, #007acc); color: white; border-color: var(--accent-primary); }
        .section { background: var(--bg-secondary, #252526); border: 1px solid var(--border-color, #3e3e42); border-radius: 12px; padding: 20px; margin-bottom: 16px; display: none; }
        .section.active { display: block; }
        .section h3 { font-size: 16px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--accent-primary, #007acc); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border-color, #3e3e42); }
        .setting-row label { font-size: 14px; }
        .setting-row select, .setting-row input { padding: 6px 10px; background: var(--bg-tertiary, #2d2d30); border: 1px solid var(--border-color, #3e3e42); border-radius: 6px; color: var(--text-primary); font-size: 13px; }
        .setting-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .reset-btn { width: 100%; padding: 12px; background: #d32f2f; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; margin-top: 10px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 8px; padding-bottom: calc(8px + var(--safe-bottom)); background: var(--bg-secondary, #252526); border-top: 1px solid var(--border-color); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 10px; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 10px; text-decoration: none; border-radius: 6px; min-width: 48px; }
        .nav-item.active { color: var(--accent-primary); }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <a href="home.html" class="back-btn">← Back</a>
            <h1 class="page-title">⚙ Settings</h1>
        </div>

        <div class="settings-nav">
            <button class="active" data-section="general">🎛 General</button>
            <button data-section="editor">✏️ Editor</button>
            <button data-section="appearance">🎨 Theme</button>
            <button data-section="terminal">⬛ Terminal</button>
            <button data-section="about">ℹ️ About</button>
        </div>

        <div class="section active" id="section-general">
            <h3>General Settings</h3>
            <div class="setting-row"><label>Auto Save</label><select><option>After Delay</option><option>On Focus Change</option><option>Off</option></select></div>
            <div class="setting-row"><label>Auto Save Delay</label><input type="number" value="1000" min="100"> ms</div>
            <div class="setting-row"><label>Confirm Before Close</label><input type="checkbox" checked></div>
            <div class="setting-row"><label>Restore Session</label><input type="checkbox" checked></div>
        </div>

        <div class="section" id="section-editor">
            <h3>Editor Settings</h3>
            <div class="setting-row"><label>Font Size</label><input type="number" value="14" min="8" max="32"> px</div>
            <div class="setting-row"><label>Tab Size</label><input type="number" value="4" min="1" max="8"></div>
            <div class="setting-row"><label>Insert Spaces</label><input type="checkbox" checked></div>
            <div class="setting-row"><label>Word Wrap</label><select><option>Off</option><option>On</option></select></div>
            <div class="setting-row"><label>Line Numbers</label><select><option>On</option><option>Off</option><option>Relative</option></select></div>
            <div class="setting-row"><label>Minimap</label><input type="checkbox" checked></div>
        </div>

        <div class="section" id="section-appearance">
            <h3>Appearance</h3>
            <div class="setting-row"><label>Color Theme</label><select id="theme-select"><option value="dark">Dark+</option><option value="light">Light+</option><option value="high-contrast">High Contrast</option></select></div>
            <div class="setting-row"><label>Icon Theme</label><select><option>Seti</option><option>Material</option></select></div>
        </div>

        <div class="section" id="section-terminal">
            <h3>Terminal Settings</h3>
            <div class="setting-row"><label>Font Size</label><input type="number" value="13" min="8" max="24"> px</div>
            <div class="setting-row"><label>Cursor Style</label><select><option>Block</option><option>Underline</option><option>Bar</option></select></div>
            <div class="setting-row"><label>Scrollback</label><input type="number" value="1000" min="100"> lines</div>
        </div>

        <div class="section" id="section-about">
            <h3>About NexusCode</h3>
            <p style="color:var(--text-secondary);line-height:1.6;">NexusCode Studio v2.0.0<br>Production-Grade Browser IDE<br><br>Built with 💻 for developers<br>Android Optimized • PWA Ready</p>
        </div>

        <button class="reset-btn" onclick="if(confirm('Reset all settings?')){alert('Settings reset!');location.reload();}">🔄 Reset All Settings</button>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
        <a href="index.html" class="nav-item"><span class="nav-icon">✏️</span>Editor</a>
        <a href="terminal/terminal.html" class="nav-item"><span class="nav-icon">⬛</span>Terminal</a>
        <a href="settings.html" class="nav-item active"><span class="nav-icon">⚙</span>Settings</a>
    </nav>

    <script>
        document.querySelectorAll('.settings-nav button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.settings-nav button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById('section-' + btn.dataset.section).classList.add('active');
            });
        });
        document.getElementById('theme-select').addEventListener('change', function() {
            document.documentElement.setAttribute('data-theme', this.value);
            localStorage.setItem('nexuscode_theme', this.value);
        });
        const saved = localStorage.getItem('nexuscode_theme');
        if (saved) { document.documentElement.setAttribute('data-theme', saved); document.getElementById('theme-select').value = saved; }
    </script>
</body>
</html>
